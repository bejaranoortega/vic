<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷 Peppa Pig – La Intro Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #6dd5fa 0%, #a8edff 55%, #b8f0a0 100%);
            font-family: 'Fredoka One', 'Arial Rounded MT Bold', 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            overflow: hidden;
            position: relative;
        }

        /* ── FONDO SVG (colinas + sol + nubes) ── */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── MARCO DE TV ── */
        .tv {
            position: relative;
            z-index: 5;
            width: min(860px, 96vw);
            aspect-ratio: 16 / 10;
            background: linear-gradient(175deg, #a8eeff 0%, #5cc8f5 100%);
            border-radius: 38px;
            border: 14px solid #ff8ab4;
            outline: 5px solid #e8426e;
            box-shadow:
                0 0 0 8px rgba(255,138,180,0.25),
                0 22px 55px rgba(0,0,0,0.28),
                inset 0 3px 18px rgba(255,255,255,0.35);
            overflow: hidden;
        }

        /* Nubes dentro de la TV */
        .tv-cloud {
            position: absolute;
            background: rgba(255,255,255,0.82);
            border-radius: 100px;
        }
        .tv-cloud::before, .tv-cloud::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.82);
            border-radius: 50%;
        }
        .tv-cloud.a { width: 120px; height: 40px; top: 28px; left: 6%; }
        .tv-cloud.a::before { width: 65px; height: 58px; top: -28px; left: 18px; }
        .tv-cloud.a::after  { width: 50px; height: 45px; top: -20px; left: 60px; }

        .tv-cloud.b { width: 150px; height: 48px; top: 35px; right: 7%; }
        .tv-cloud.b::before { width: 75px; height: 65px; top: -32px; left: 22px; }
        .tv-cloud.b::after  { width: 58px; height: 50px; top: -24px; left: 76px; }

        /* Sol dentro de la TV */
        .tv-sun {
            position: absolute;
            top: 18px; left: 46%;
            width: 78px; height: 78px;
            background: radial-gradient(circle, #fffde7, #fdd835);
            border-radius: 50%;
            box-shadow: 0 0 0 12px rgba(253,216,53,0.25), 0 0 35px rgba(253,216,53,0.6);
            animation: sunPulse 3s ease-in-out infinite;
        }
        @keyframes sunPulse {
            0%,100% { box-shadow: 0 0 0 12px rgba(253,216,53,0.25), 0 0 35px rgba(253,216,53,0.6); }
            50%     { box-shadow: 0 0 0 22px rgba(253,216,53,0.15), 0 0 60px rgba(253,216,53,0.5); }
        }

        /* Suelo verde dentro de la TV */
        .tv-ground {
            position: absolute;
            bottom: 0; left: -8%; right: -8%;
            height: 36%;
            background: linear-gradient(180deg, #7bd148 0%, #5aab30 100%);
            border-radius: 55% 55% 0 0;
        }

        /* ── SUBTÍTULO ── */
        .subtitle {
            position: absolute;
            top: 18px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.97);
            border: 3.5px solid #ff6fa3;
            border-radius: 50px;
            padding: 11px 28px;
            font-size: clamp(0.95rem, 2.4vw, 1.55rem);
            color: #333;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 6px 0 #ffc6db, 0 10px 22px rgba(0,0,0,0.1);
            z-index: 20;
            display: none;
            max-width: 88%;
            white-space: normal;
        }

        /* ── LOGO ── */
        .logo-wrap {
            position: absolute;
            top: 48%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.55);
            z-index: 30;
            text-align: center;
            pointer-events: none;
        }
        .logo-wrap.show {
            transform: translate(-50%, -50%) scale(1);
        }

        /* ── ESCENARIO ── */
        .stage {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 58%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 0;
            padding: 0 20px 8px;
            z-index: 10;
        }

        /* ── PERSONAJES ── */
        .char-wrap {
            position: relative;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            transform: translateY(50px) scale(0.4);
            transition: opacity 0.5s ease, transform 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.4);
            transform-origin: bottom center;
            flex-shrink: 0;
        }
        .char-wrap.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        /* El bounce de hablar se aplica al SVG directo, no al wrapper */
        .char-wrap.talking svg {
            animation: bounce 0.38s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 18px rgba(255,255,255,0.9));
            transform-origin: bottom center;
        }
        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(-22px) scale(1.06); }
        }

        /* ── BOTÓN ── */
        .btn {
            position: relative;
            z-index: 10;
            background: #ff3d7f;
            color: #fff;
            border: none;
            padding: 15px 42px;
            border-radius: 50px;
            font-family: 'Fredoka One', sans-serif;
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            cursor: pointer;
            box-shadow: 0 8px 0 #be1056, 0 14px 30px rgba(255,61,127,0.38);
            transition: transform 0.1s, box-shadow 0.1s;
            letter-spacing: 0.3px;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:active:not(:disabled) { transform: translateY(5px); box-shadow: 0 3px 0 #be1056; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }

        /* ── CONFETTI ── */
        .confetti {
            position: fixed;
            border-radius: 2px;
            animation: fall linear forwards;
            z-index: 100;
            pointer-events: none;
        }
        @keyframes fall {
            0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(900deg); opacity: 0; }
        }
    </style>
</head>

<button class="btn" id="mainBtn" onclick="startIntro()">🎬 REPRODUCIR INTRO 🎬</button>

<script>
/* ═══════════════════════════════════════
   AUDIO
═══════════════════════════════════════ */
let ctx;
function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
}
function playTone(freq, dur, type='sine', vol=0.1) {
    const c = getCtx();
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur);
}
function snort(pitch=1) {
    playTone(160*pitch, 0.13, 'sawtooth', 0.07);
    setTimeout(() => playTone(125*pitch, 0.1, 'sawtooth', 0.05), 90);
}
const NOTES = [[523.25,0],[659.25,170],[783.99,340],[659.25,580],[880,730],[1046.5,900]];
function jingle() {
    NOTES.forEach(([f,t]) => setTimeout(() => playTone(f, 0.22, 'sine', 0.13), t));
}

/* ═══════════════════════════════════════
   SÍNTESIS DE VOZ
   Devuelve una Promise que resuelve cuando
   termina de hablar (o después de timeout)
═══════════════════════════════════════ */
function speak(text, pitch=1, rate=1.05) {
    return new Promise(resolve => {
        if (!window.speechSynthesis) { setTimeout(resolve, 2000); return; }
        window.speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(text);
        u.lang  = 'es-MX';
        u.pitch = pitch;
        u.rate  = rate;

        // Seguro contra onend que no dispara en algunos navegadores
        const fallback = setTimeout(resolve, text.length * 80 + 1500);
        u.onend  = () => { clearTimeout(fallback); resolve(); };
        u.onerror= () => { clearTimeout(fallback); resolve(); };

        window.speechSynthesis.speak(u);
    });
}

/* ═══════════════════════════════════════
   UTILIDADES
═══════════════════════════════════════ */
const wait = ms => new Promise(r => setTimeout(r, ms));

function setSubtitle(html) {
    const s = document.getElementById('subtitle');
    s.style.display = 'block';
    s.innerHTML = html;
}

function showChar(id)      { document.getElementById(id).classList.add('show'); }
function setTalk(id, on)   { document.getElementById(id).classList.toggle('talking', on); }

function launchConfetti() {
    const colors = ['#ff3d7f','#ffe036','#4a8fd4','#6dc549','#ff89b0','#ffffff','#ff6fab'];
    for (let i = 0; i < 70; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        const size = 7 + Math.random() * 11;
        el.style.cssText = `
            left:${Math.random()*100}vw;
            top:-30px;
            width:${size}px; height:${size}px;
            background:${colors[i % colors.length]};
            border-radius:${Math.random()>.45 ? '50%':'3px'};
            animation-duration:${2.2+Math.random()*2}s;
            animation-delay:${Math.random()*1.8}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 6000);
    }
}

/* ═══════════════════════════════════════
   SECUENCIA PRINCIPAL  (async → sin cortes)
═══════════════════════════════════════ */
async function startIntro() {
    const btn = document.getElementById('mainBtn');
    btn.disabled = true;

    // Reset
    ['cGeorge','cMama','cPeppa','cPapa'].forEach(id => {
        document.getElementById(id).className = 'char-wrap';
    });
    document.getElementById('logo').classList.remove('show');
    const sub = document.getElementById('subtitle');
    sub.style.display = 'none';

    await wait(300);
    jingle();
    await wait(1100);

    /* 1 · PEPPA ─────────────────────────── */
    showChar('cPeppa');
    await wait(650);
    setSubtitle("🐷 ¡Soy Peppa Pig!");
    snort(1.5);
    setTalk('cPeppa', true);
    await speak("¡Soy Peppa Pig!", 1.45);
    setTalk('cPeppa', false);
    await wait(450);

    /* 2 · GEORGE ────────────────────────── */
    showChar('cGeorge');
    await wait(650);
    setSubtitle("🦕 Este es mi hermano pequeño, George.");
    snort(1.9);
    setTalk('cPeppa', true);
    await speak("Este es mi hermano pequeño, George.", 1.4);
    setTalk('cPeppa', false);
    await wait(450);

    /* 3 · MAMÁ ──────────────────────────── */
    showChar('cMama');
    await wait(650);
    setSubtitle("🧡 Esta es Mamá Cerdita.");
    snort(1.1);
    setTalk('cMama', true);
    await speak("Esta es Mamá Cerdita.", 1.1);
    setTalk('cMama', false);
    await wait(450);

    /* 4 · PAPÁ ──────────────────────────── */
    showChar('cPapa');
    await wait(650);
    setSubtitle("👓 Y este es Papá Cerdito.");
    snort(0.68);
    setTalk('cPapa', true);
    await speak("Y este es Papá Cerdito.", 0.72);
    setTalk('cPapa', false);
    await wait(550);

    /* 5 · FINAL ─────────────────────────── */
    setSubtitle("🎵 ¡Ja ja ja ja! ¡Peppa Pig! 🎵");
    ['cGeorge','cMama','cPeppa','cPapa'].forEach(id => setTalk(id, true));
    document.getElementById('logo').classList.add('show');
    jingle();
    snort(1.3);
    launchConfetti();
    await speak("¡Ja ja ja ja! ¡Peppa Pig!", 1.3, 0.95);
    ['cGeorge','cMama','cPeppa','cPapa'].forEach(id => setTalk(id, false));

    await wait(400);
    btn.disabled = false;
    btn.textContent = "🔄 REPETIR INTRO 🔄";
}
</script>
</body>
</html>
