<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Te casas conmigo? ❤️</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fbeee6; /* Fondo crema romántico */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .card {
            text-align: center;
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 90%;
            z-index: 10;
            border: 2px solid #f5b7b1;
            transition: all 0.3s ease;
        }

        h1 {
            color: #cd6155;
            font-size: 2.2rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .btn-si {
            background-color: #2ec4b6;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 196, 182, 0.4);
        }

        .btn-si:active {
            transform: scale(0.95);
        }

        .btn-no {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            transition: all 0.2s ease;
            left: 55%; /* Posición inicial */
        }

        /* Lienzo para los fuegos artificiales */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="card" id="mainCard">
        <h1 id="questionText">¿Te casas conmigo? ❤️</h1>
        
        <div class="btn-container">
            <button class="btn-si" style="position: absolute; right: 55%;" onclick="celebrate()">SÍ</button>
            
            <button class="btn-no" id="btnNo" onmouseover="moveButton()" onclick="moveButton()">NO</button>
        </div>
    </div>

    <script>
        // --- LÓGICA PARA ESCAPAR DEL BOTÓN "NO" ---
        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            
            // Calculamos posiciones aleatorias dentro de la ventana del navegador
            // Restamos parte del tamaño para evitar que se salga de los bordes de la pantalla
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 40) + 20;
            
            // Cambiamos el comportamiento a fixed para que se mueva libre por toda la pantalla externa a la tarjeta
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        // --- LÓGICA DE FUEGOS ARTIFICIALES (CANVAS) ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                // Velocidad y dirección aleatoria
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.gravity = 0.12;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
        }

        function createFirework() {
            // Genera un disparo en coordenadas X aleatorias de la pantalla
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6); // En la mitad superior
            const colors = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#33FFF0'];
            const color = colors[Math.floor(Math.random() * colors.length)];

            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Frecuencia con la que nacen nuevos fuegos artificiales
            if (Math.random() < 0.05) {
                createFirework();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            animationId = requestAnimationFrame(animate);
        }

        // --- ACCIÓN AL PRESIONAR SÍ ---
        function celebrate() {
            // Cambiar el texto de la propuesta
            document.getElementById('questionText').innerHTML = "¡Sabía que dirías que sí! 💖💍";
            
            // Ocultar el botón NO por completo
            document.getElementById('btnNo').classList.add('hidden');
            
            // Iniciar fuegos artificiales si no se han iniciado ya
            if (!animationId) {
                animate();
            }
        }
    </script>
</body>
</html>
