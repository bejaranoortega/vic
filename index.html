<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo Vic 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #ff2d6b;
    --pink: #ff6fa3;
    --blush: #ffd6e7;
    --deep: #0d0008;
  }

  body {
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Dancing Script', cursive;
    overflow: hidden;
    position: relative;
  }

  /* Canvas de partículas - siempre visible */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* Fondo gradiente */
  .bg-gradient {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(120,0,40,0.45) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(80,0,50,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(100,0,30,0.3) 0%, transparent 50%),
      var(--deep);
    animation: bgShift 8s ease-in-out infinite alternate;
  }
  @keyframes bgShift {
    0% { filter: hue-rotate(0deg); }
    100% { filter: hue-rotate(15deg); }
  }

  /* ── PANTALLA DE INICIO ── */
  #start-screen {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    transition: opacity 0.8s ease;
  }
  #start-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .start-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(3rem, 10vw, 6rem);
    color: var(--blush);
    text-shadow: 0 0 40px rgba(255,45,107,0.8);
    text-align: center;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 30px rgba(255,45,107,0.7); }
    50%      { text-shadow: 0 0 60px rgba(255,45,107,1), 0 0 100px rgba(255,100,150,0.5); }
  }

  #start-btn {
    background: transparent;
    border: 2px solid rgba(255,45,107,0.7);
    color: var(--blush);
    font-family: 'Dancing Script', cursive;
    font-size: 1.8rem;
    padding: 1rem 3.5rem;
    border-radius: 60px;
    cursor: pointer;
    letter-spacing: 0.08em;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(255,45,107,0.25), inset 0 0 30px rgba(255,45,107,0.05);
    transition: all 0.35s;
    position: relative;
    overflow: hidden;
  }
  #start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,45,107,0.15), rgba(255,100,150,0.1));
    opacity: 0;
    transition: opacity 0.35s;
  }
  #start-btn:hover { 
    border-color: var(--rose);
    box-shadow: 0 0 50px rgba(255,45,107,0.6), inset 0 0 40px rgba(255,45,107,0.1);
    transform: scale(1.05);
  }
  #start-btn:hover::before { opacity: 1; }

  .start-hearts {
    font-size: 1.2rem;
    opacity: 0.5;
    letter-spacing: 0.5rem;
    color: var(--pink);
    animation: fadeHeart 2s ease-in-out infinite;
  }
  @keyframes fadeHeart {
    0%,100% { opacity: 0.3; }
    50%      { opacity: 0.7; }
  }

  /* ── STAGE DE MENSAJES ── */
  #stage {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .message {
    position: absolute;
    text-align: center;
    padding: 0 2rem;
    width: 100%;
    max-width: 820px;
    opacity: 0;
    transform: translateY(32px) scale(0.88);
    pointer-events: none;
    will-change: opacity, transform;
    transition: none;
  }
  .message.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    transition: opacity 0.9s cubic-bezier(.22,1,.36,1), transform 0.9s cubic-bezier(.22,1,.36,1);
  }
  .message.exit {
    opacity: 0;
    transform: translateY(-30px) scale(1.06);
    transition: opacity 0.55s ease-in, transform 0.55s ease-in;
  }

  .msg-text {
    line-height: 1.1;
    color: var(--blush);
    text-shadow: 0 0 40px rgba(255,45,107,0.8), 0 0 80px rgba(255,45,107,0.35);
    letter-spacing: 0.02em;
  }

  .size-xl .msg-text { font-size: clamp(3.5rem, 11vw, 7.5rem); font-weight: 700; }
  .size-lg .msg-text { font-size: clamp(2.8rem, 8vw,  5.5rem); font-weight: 700; }
  .size-md .msg-text { font-size: clamp(2rem,   6vw,  4rem);   font-weight: 400; }
  .size-sm .msg-text { font-size: clamp(1.5rem, 4.5vw,3rem);   font-weight: 400; font-style: italic; }

  .color-1 .msg-text { color: #ffd6e7; }
  .color-2 .msg-text { color: #ffb3cc; text-shadow: 0 0 40px rgba(255,100,160,.9), 0 0 80px rgba(255,100,160,.4); }
  .color-3 .msg-text { color: #fff0f5; font-family: 'Great Vibes', cursive; }
  .color-4 .msg-text { color: #ff9dc5; text-shadow: 0 0 50px rgba(255,45,107,1), 0 0 100px rgba(255,45,107,.5); }
  .color-5 .msg-text { color: #ffe4ee; }
  .color-6 .msg-text { color: #ffcce0; font-family: 'Playfair Display', serif; font-style: italic; }

  /* ── TEXTO FINAL encima del corazón de partículas ── */
  #heart-label {
    position: fixed;
    inset: 0;
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  #heart-label.show { opacity: 1; }

  .heart-text {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(2.2rem, 7vw, 5rem);
    color: var(--blush);
    text-shadow: 0 0 30px rgba(255,45,107,0.9);
    margin-top: 52vh;   /* empuja el texto debajo del corazón centrado */
    animation: fadeUpIn 1.5s 0.3s both;
  }
  @keyframes fadeUpIn {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0);    }
  }

  /* Confetti */
  .confetti-heart {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { opacity:1;   transform: translateY(-20px) rotate(0deg);   }
    100% { opacity:0.2; transform: translateY(110vh) rotate(720deg); }
  }

  /* Barra de progreso */
  #progress-bar {
    position: fixed;
    bottom: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--pink), var(--blush));
    z-index: 100;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px var(--rose);
  }

  /* Botón replay */
  #replay-btn {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,45,107,0.12);
    border: 1px solid rgba(255,45,107,0.45);
    color: var(--blush);
    font-family: 'Dancing Script', cursive;
    font-size: 1.3rem;
    padding: 0.7rem 2.5rem;
    border-radius: 50px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    opacity: 0;
    transition: all 0.4s;
    pointer-events: none;
    z-index: 100;
  }
  #replay-btn.show { opacity:1; pointer-events:all; }
  #replay-btn:hover {
    background: rgba(255,45,107,0.3);
    box-shadow: 0 0 30px rgba(255,45,107,0.4);
    transform: translateX(-50%) scale(1.05);
  }
</style>
</head>
<body>

<div class="bg-gradient"></div>
<canvas id="particles"></canvas>
<div id="progress-bar"></div>

<!-- PANTALLA INICIO -->
<div id="start-screen">
  <div class="start-title">para Vic ❤️</div>
  <button id="start-btn" onclick="startShow()">comenzar</button>
  <div class="start-hearts">❤ ❤ ❤</div>
</div>

<!-- MENSAJES -->
<div id="stage">
  <div class="message size-xl color-1" id="m0"><span class="msg-text">te amo bro</span></div>
  <div class="message size-xl color-2" id="m1"><span class="msg-text">te amo mucho</span></div>
  <div class="message size-xl color-3" id="m2"><span class="msg-text">princesa</span></div>
  <div class="message size-xl color-4" id="m3"><span class="msg-text">reina</span></div>
  <div class="message size-xl color-5" id="m4"><span class="msg-text">preciosa</span></div>
  <div class="message size-sm color-6" id="m5"><span class="msg-text">te amo tanto que no lo puedo decir<br>porque no termino</span></div>
  <div class="message size-md color-1" id="m6"><span class="msg-text">eres mi princesa hermosa</span></div>
  <div class="message size-md color-2" id="m7"><span class="msg-text">te amo cada día más</span></div>
  <div class="message size-xl color-3" id="m8"><span class="msg-text">te amo Vic</span></div>
</div>

<!-- Texto sobre el corazón de partículas -->
<div id="heart-label">
  <div class="heart-text">para siempre, Vic ❤️</div>
</div>

<button id="replay-btn" onclick="restart()">🔁 Ver de nuevo</button>

<script>
/* ═══════════════════════════════════════════
   PARTÍCULAS + FORMACIÓN DE CORAZÓN
═══════════════════════════════════════════ */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');

let W, H, particles = [], heartTargets = [];
let formingHeart = false, heartFormed = false;
let animId;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildHeartTargets();
}

/* Ecuación paramétrica del corazón */
function heartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return { x, y };
}

function buildHeartTargets() {
  heartTargets = [];
  const scale  = Math.min(W, H) * 0.032;   // escala relativa a pantalla
  const cx = W / 2, cy = H / 2;
  const N  = 280;
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2;
    const p = heartPoint(t);
    heartTargets.push({ x: cx + p.x * scale, y: cy + p.y * scale });
  }
  // puntos de relleno interior
  for (let a = 0; a < Math.PI * 2; a += 0.18) {
    for (let r = 0.3; r <= 0.95; r += 0.22) {
      const p = heartPoint(a);
      heartTargets.push({ x: cx + p.x * scale * r, y: cy + p.y * scale * r });
    }
  }
}

function createParticles() {
  particles = [];
  const total = heartTargets.length;
  for (let i = 0; i < total; i++) {
    const hue = 330 + Math.random() * 40;
    particles.push({
      x:   Math.random() * W,
      y:   Math.random() * H,
      vx:  (Math.random() - 0.5) * 0.6,
      vy: -Math.random() * 0.5 - 0.1,
      r:   Math.random() * 2.2 + 0.8,
      alpha:  Math.random(),
      dalpha: (Math.random() - 0.5) * 0.009,
      color:  `hsl(${hue}, 100%, ${70 + Math.random()*20}%)`,
      // destino en el corazón
      tx: heartTargets[i].x,
      ty: heartTargets[i].y,
      // estado "formando"
      progress: 0,
    });
  }
}

function lerp(a, b, t) { return a + (b - a) * t; }

function drawFrame() {
  ctx.clearRect(0, 0, W, H);

  for (const p of particles) {
    if (formingHeart) {
      // avanzar hacia el destino
      p.progress = Math.min(1, p.progress + 0.018);
      const ease = 1 - Math.pow(1 - p.progress, 3);
      p.x = lerp(p.x, p.tx, ease * 0.06);
      p.y = lerp(p.y, p.ty, ease * 0.06);
      p.alpha = lerp(p.alpha, 1, 0.04);
      p.r     = lerp(p.r, 3.2, 0.03);
    } else {
      // flotar libremente
      p.x += p.vx;
      p.y += p.vy;
      p.alpha += p.dalpha;
      if (p.alpha <= 0 || p.alpha >= 1) p.dalpha *= -1;
      if (p.y < -10)      { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < 0 || p.x > W) p.vx *= -1;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);

    if (formingHeart && p.progress > 0.5) {
      // color brillante al formar el corazón
      const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
      glow.addColorStop(0, p.color);
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.shadowBlur  = 12;
      ctx.shadowColor = p.color;
    } else {
      ctx.fillStyle   = p.color;
      ctx.shadowBlur  = 6;
      ctx.shadowColor = p.color;
    }

    ctx.globalAlpha = Math.max(0, Math.min(1, p.alpha));
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
  }

  animId = requestAnimationFrame(drawFrame);
}

/* ═══════════════════════════════════════════
   SHOW DE MENSAJES
═══════════════════════════════════════════ */
const msgIds    = ['m0','m1','m2','m3','m4','m5','m6','m7','m8'];
const durations = [2100,2300,2000,2000,2100,3600,2900,2900,2600];
let timers = [];

function clearTimers() {
  timers.forEach(clearTimeout);
  timers = [];
}

function showMsg(index, delay, totalTime, elapsed) {
  if (index >= msgIds.length) {
    // Activar formación del corazón
    const t = setTimeout(() => {
      formingHeart = true;
      // Mostrar texto después de que el corazón esté casi formado
      setTimeout(() => {
        document.getElementById('heart-label').classList.add('show');
        launchConfetti();
        setTimeout(() => document.getElementById('replay-btn').classList.add('show'), 2000);
      }, 2800);
    }, delay + 400);
    timers.push(t);
    return;
  }

  const id  = msgIds[index];
  const dur = durations[index];
  const el  = document.getElementById(id);

  const t1 = setTimeout(() => {
    el.classList.add('active');
    setProgress((elapsed + delay) / totalTime * 100);
  }, delay);
  timers.push(t1);

  const t2 = setTimeout(() => {
    el.classList.remove('active');
    el.classList.add('exit');
    setTimeout(() => el.classList.remove('exit'), 650);
    showMsg(index + 1, 0, totalTime, elapsed + delay + dur);
    setProgress((elapsed + delay + dur * 0.85) / totalTime * 100);
  }, delay + dur);
  timers.push(t2);
}

function setProgress(pct) {
  document.getElementById('progress-bar').style.width = Math.min(100, pct) + '%';
}

function startShow() {
  // Ocultar pantalla inicio
  const ss = document.getElementById('start-screen');
  ss.classList.add('hidden');
  setTimeout(() => ss.style.display = 'none', 900);

  const total = durations.reduce((a,b) => a+b, 0) + 3500;
  showMsg(0, 300, total, 0);
}

function restart() {
  // Resetear todo
  clearTimers();
  formingHeart = false;
  msgIds.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('active','exit');
  });
  document.getElementById('heart-label').classList.remove('show');
  document.getElementById('replay-btn').classList.remove('show');
  document.getElementById('progress-bar').style.width = '0%';
  document.querySelectorAll('.confetti-heart').forEach(e => e.remove());

  // Resetear partículas a posiciones aleatorias
  for (const p of particles) {
    p.x = Math.random() * W;
    p.y = Math.random() * H;
    p.progress = 0;
    p.r = Math.random() * 2.2 + 0.8;
    p.alpha = Math.random();
  }

  // Esperar un poco y empezar
  setTimeout(() => startShow(), 300);
}

/* ═══════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════ */
function launchConfetti() {
  const emojis = ['❤️','💕','💖','💗','💓','✨','🌸','💞'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el  = document.createElement('div');
      el.className = 'confetti-heart';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left     = Math.random() * 100 + 'vw';
      el.style.top      = '-30px';
      el.style.fontSize = (0.9 + Math.random() * 2) + 'rem';
      const dur = 3 + Math.random() * 4;
      el.style.animation = `fall ${dur}s linear forwards`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 300);
    }, i * 100);
  }
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
window.addEventListener('resize', () => { resize(); });
resize();
createParticles();
drawFrame();
</script>
</body>
</html>
