<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor Pepa</title>
    <style>
        /* Estilos generales */
        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #1e1e2f, #3a3a5e); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
        }

        .pantalla { text-align: center; display: none; width: 100%; }
        .activa { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }

        /* Diseño de botones */
        button { 
            padding: 15px 40px; 
            font-size: 22px; 
            font-weight: bold;
            cursor: pointer; 
            background: #ff7e5f; 
            border: none; 
            border-radius: 50px; 
            color: white;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:hover { transform: scale(1.05); background: #feb47b; }

        /* Video responsivo */
        video { 
            width: 100%; 
            height: 100vh; 
            object-fit: contain; /* Ajusta sin recortar ni deformar */
            background: black;
        }

        h1 { margin-bottom: 30px; font-size: 3rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="portadaInicio" class="pantalla activa">
        <h1>¡Bienvenido!</h1>
        <button onclick="iniciar()">Iniciar xd</button>
    </div>

    <div id="contenedorVideo" class="pantalla">
        <video id="miVideo" src="pepa.mp4"></video>
    </div>

    <div id="portadaFinal" class="pantalla">
        <h1>¡Se acabó!</h1>
        <button onclick="iniciar()">Repetir</button>
    </div>

    <script>
        const video = document.getElementById('miVideo');

        function iniciar() {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById('contenedorVideo').classList.add('activa');
            video.play();
        }

        video.onended = function() {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById('portadaFinal').classList.add('activa');
        };
    </script>
</body>
</html>
